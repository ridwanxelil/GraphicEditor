function autoFit(){
  if(!uImg)return;
  const isVert=(layoutMode==='v-top'||layoutMode==='v-bottom');
  const isFull=(layoutMode==='full-fade'||layoutMode==='full-vignette');
  if(isFull){
    // Tam ekran: tüm canvas'ı kaplasın
    pSc=Math.max(canvasW/uImg.naturalWidth,canvasH/uImg.naturalHeight);
    pX=canvasW/2;pY=canvasH/2;
  } else if(isVert){
    // Dikey layout: foto üst veya alt yarıya sığsın
    const photoH=canvasH*(imgWidth/100);
    pSc=Math.max(canvasW/uImg.naturalWidth,photoH/uImg.naturalHeight);
    pX=canvasW/2;
    pY=layoutMode==='v-top'?photoH/2:canvasH-photoH/2;
  } else {
    // Yatay layout: foto sol veya sağ alanına sığsın
    const tw=canvasW*(imgWidth/100);
    pSc=Math.max(tw/uImg.naturalWidth,canvasH/uImg.naturalHeight);
    pX=imgSide==='right'?canvasW-(tw/2):tw/2;pY=canvasH/2;
  }
}
function drawPhoto(){
  const cv=document.getElementById('photo-canvas');
  cv.width=canvasW;cv.height=canvasH;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,canvasW,canvasH);
  if(!uImg)return;
  const isVert=(layoutMode==='v-top'||layoutMode==='v-bottom');
  const isFull=(layoutMode==='full-fade'||layoutMode==='full-vignette');
  let photoW,photoH,clipX,clipY,clipW,clipH;
  if(isFull){
    clipX=0;clipY=0;clipW=canvasW;clipH=canvasH;
  } else if(isVert){
    const ph2=canvasH*(imgWidth/100);
    clipX=0;clipW=canvasW;clipH=ph2;
    clipY=layoutMode==='v-top'?0:canvasH-ph2;
  } else {
    photoW=canvasW*(imgWidth/100);
    clipX=imgSide==='right'?canvasW-photoW:0;
    clipY=0;clipW=photoW;clipH=canvasH;
  }
  const oc=document.createElement('canvas');oc.width=canvasW;oc.height=canvasH;
  const oc2=oc.getContext('2d');
  oc2.save();oc2.translate(pX,pY);oc2.rotate(pRot*Math.PI/180);
  const fw=flipH?-1:1,fh=flipV?-1:1;oc2.scale(fw,fh);
  const w=uImg.naturalWidth*pSc,h=uImg.naturalHeight*pSc;
  oc2.drawImage(uImg,-w/2,-h/2,w,h);oc2.restore();
  ctx.save();
  ctx.beginPath();ctx.rect(clipX,clipY,clipW,clipH||canvasH);ctx.clip();
  const fs2=[fBlur>0?`blur(${fBlur}px)`:'',fSat!==100?`saturate(${fSat}%)`:'',fBr!==100?`brightness(${fBr}%)`:'',fCt!==100?`contrast(${fCt}%)`:''].filter(Boolean).join(' ')||'none';
  ctx.filter=fs2;ctx.drawImage(oc,0,0);ctx.filter='none';
  if(fDark>0){ctx.fillStyle=`rgba(0,0,0,${fDark/100})`;ctx.fillRect(0,0,canvasW,canvasH);}
  if(tintAmount>0){
    const tr2=parseInt(tintColor.slice(1,3),16),tg2=parseInt(tintColor.slice(3,5),16),tb2=parseInt(tintColor.slice(5,7),16);
    ctx.fillStyle=`rgba(${tr2},${tg2},${tb2},${tintAmount/100})`;ctx.fillRect(0,0,canvasW,canvasH);
  }
  ctx.restore();
  // Renk paleti çıkar (fotoğraf yüklenince)
  if(extractedPalette.length===0)extractPalette(oc);
}
function panPhoto(dx,dy){pX+=dx;pY+=dy;drawPhoto();}

/* ══ GUIDE OVERLAY (Safe Zone + Grid) ══ */
function drawGuideOverlay(){
  let ov=document.getElementById('guide-overlay');
  if(!ov){
    ov=document.createElement('canvas');
    ov.id='guide-overlay';
    ov.style.cssText='position:absolute;inset:0;z-index:50;pointer-events:none';
    const banner=document.getElementById('banner');
    if(banner)banner.appendChild(ov);
  }
  ov.width=canvasW;ov.height=canvasH;
  const ctx=ov.getContext('2d');
  ctx.clearRect(0,0,canvasW,canvasH);
  if(showSafeZone){
    const mx=canvasW*0.05,my=canvasH*0.05;
    ctx.strokeStyle='rgba(255,200,0,0.6)';ctx.lineWidth=3;ctx.setLineDash([12,8]);
    ctx.strokeRect(mx,my,canvasW-mx*2,canvasH-my*2);
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,200,0,0.18)';
    ctx.fillRect(0,0,canvasW,my);ctx.fillRect(0,canvasH-my,canvasW,my);
    ctx.fillRect(0,my,mx,canvasH-my*2);ctx.fillRect(canvasW-mx,my,mx,canvasH-my*2);
    ctx.font=`bold ${14*canvasW/1920}px 'Fira Sans',sans-serif`;
    ctx.fillStyle='rgba(255,200,0,0.9)';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('SAFE ZONE %5',mx+8,my+6);
  }
  if(showGridGuide){
    ctx.strokeStyle='rgba(100,160,255,0.28)';ctx.lineWidth=1;ctx.setLineDash([4,6]);
    // Üçte bir çizgileri
    for(let i=1;i<3;i++){
      ctx.beginPath();ctx.moveTo(canvasW*i/3,0);ctx.lineTo(canvasW*i/3,canvasH);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,canvasH*i/3);ctx.lineTo(canvasW,canvasH*i/3);ctx.stroke();
    }
    ctx.setLineDash([]);
    // Merkez crosshair
    ctx.strokeStyle='rgba(100,160,255,0.45)';
    ctx.beginPath();ctx.moveTo(canvasW/2-20,canvasH/2);ctx.lineTo(canvasW/2+20,canvasH/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(canvasW/2,canvasH/2-20);ctx.lineTo(canvasW/2,canvasH/2+20);ctx.stroke();
  }
}

/* ══ RENK PALETİ ÇIKARICISI ══ */
function extractPalette(canvas){
  try{
    const ctx=canvas.getContext('2d');
    const iw=canvas.width,ih=canvas.height;
    const step=Math.max(1,Math.floor(Math.min(iw,ih)/30));
    const map={};
    for(let y=0;y<ih;y+=step){
      for(let x=0;x<iw;x+=step){
        const d=ctx.getImageData(x,y,1,1).data;
        const key=`${Math.round(d[0]/32)*32},${Math.round(d[1]/32)*32},${Math.round(d[2]/32)*32}`;
        map[key]=(map[key]||0)+1;
      }
    }
    const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
    extractedPalette=sorted.map(([k])=>{const [r,g,b]=k.split(',');return '#'+[r,g,b].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');});
    // Görsel paneli açıksa palette güncelle
    const pe=document.getElementById('palette-row');
    if(pe)renderPaletteRow(pe);
  }catch(e){}
}
function renderPaletteRow(container){
  if(!container)return;
  container.innerHTML=extractedPalette.length
    ?'<div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Fotoğraf Renkleri</div>'
     +'<div style="display:flex;gap:5px;flex-wrap:wrap">'
     +extractedPalette.map(c=>`<div style="width:28px;height:28px;border-radius:4px;background:${c};cursor:pointer;border:2px solid rgba(255,255,255,.15);flex-shrink:0" title="${c}" onclick="applyPaletteColor('${c}')"></div>`).join('')
     +'</div>':'' ;
}
function applyPaletteColor(c){
  bgColor=c;applyBgColor();
  const bc=document.getElementById('tb-bg-color');if(bc)bc.value=c;
  toast('Palet rengi uygulandı: '+c);
}

function updateVal(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function updateHex(id,v){const el=document.getElementById(id);if(el)el.textContent=v.toUpperCase();}
function setShadow(c){document.getElementById('main-text').style.textShadow=`2px 2px 8px ${c}cc,0 0 20px ${c}55`;}
function applySubShadow(which,c){
  const ids={ust:'ust-text',alt:'alt-text'};
  const el=document.getElementById(ids[which]);
  if(el)el.style.textShadow=`1px 1px 6px ${c}cc,0 0 12px ${c}55`;
}
function setBg(which,color,op){
  const ids={ust:'bg-ust',main:'bg-main',alt:'bg-alt'};
  const el=document.getElementById(ids[which]);if(!el)return;
  const o=parseInt(op)/100;
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  el.style.background=`rgba(${r},${g},${b},${o})`;
}
function setSubText(which,val){
  const id=which==='ust'?'ust-text':'alt-text';
  const span=document.getElementById(id);if(!span)return;
  if(span.innerText!==val)span.innerText=val;
}
function switchMetinTab(which,btn){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.querySelectorAll('.mtab-panel').forEach(p=>p.classList.remove('on'));
  const tp=document.getElementById('mtp-'+which);if(tp)tp.classList.add('on');
}
function applySubStyle(which,prop,val){
  const id=which==='ust'?'ust-text':'alt-text';
  const el=document.getElementById(id);if(!el)return;
  if(prop==='textAlign')el.style.display='block';
  el.style[prop]=val;
}
function setAlignBtn(btn,dir){
  const bar=btn.closest('.fmt-bar');
  if(bar)bar.querySelectorAll('.ab').forEach(b=>b.classList.toggle('on',b.dataset.a===dir));
}
function fmtEl(id,cmd,btn){
  const el=document.getElementById(id);if(!el)return;
  el.focus();document.execCommand(cmd,false,null);
  if(btn){
    const bar=btn.closest('.fmt-bar');const cmdMap={bold:'fa-bold',italic:'fa-italic',underline:'fa-underline',strikeThrough:'fa-strikethrough'};
    if(bar)bar.querySelectorAll('.fmt-b').forEach(b=>{const i=b.querySelector('i');if(i&&i.classList.contains(cmdMap[cmd]))b.classList.toggle('on',document.queryCommandState(cmd));});
  }
}
function syncMainText(val){const el=document.getElementById('main-text');if(!el)return;if(el.innerText!==val)el.innerText=val;}

/* ── GÖLGE FİNE-TUNE ── */
let _mainSh={ox:4,oy:4,bl:20,op:95};
function applyMainShadowProp(prop,val){
  _mainSh[prop]=parseFloat(val)||0;
  const el=document.getElementById('main-text');if(!el)return;
  const o=Math.min(1,_mainSh.op/100);
  el.style.textShadow=`${_mainSh.ox}px ${_mainSh.oy}px ${_mainSh.bl}px rgba(0,0,0,${o})`;
}

  applyTheme(t);
  document.querySelectorAll('.thb').forEach(b=>{
    const is=(t==='dark'&&b.textContent.includes('Karanlık'))||(t==='light'&&b.textContent.includes('Açık'))||(t==='system'&&b.textContent.includes('Sistem'));

/* ══ DOWNLOAD ══ */
async function doDownload(){
  const ld=document.getElementById('loading');ld.classList.add('on');
  try{
    const fmtEl=document.getElementById('dl-fmt');
    const fmt2=fmtEl?fmtEl.value:_fmt;
    // Export boyutu = mevcut canvasW/H (ebat zaten seçilmiş)
    const W=canvasW, H=canvasH;
    const S=1; // Export canvas = live canvas boyutu, ölçek 1:1

    const out=document.createElement('canvas');
    out.width=W;out.height=H;
    const ctx=out.getContext('2d');

    // 1. ARKA PLAN
    ctx.fillStyle=bgColor;
    ctx.fillRect(0,0,W,H);

    // 2. FOTOĞRAF — layout moduna göre kırpma alanı
    if(uImg){
      const isVert=(layoutMode==='v-top'||layoutMode==='v-bottom');
      const isFull=(layoutMode==='full-fade'||layoutMode==='full-vignette');
      let clipX=0,clipY=0,clipW=W,clipH=H;
      if(!isFull){
        if(isVert){
          const ph=H*(imgWidth/100);
          clipW=W;clipH=ph;
          clipX=0;clipY=layoutMode==='v-top'?0:H-ph;
        } else {
          const pw=W*(imgWidth/100);
          clipW=pw;clipH=H;
          clipX=imgSide==='right'?W-pw:0;clipY=0;
        }
      }
      const oc=document.createElement('canvas');oc.width=W;oc.height=H;
      const oc2=oc.getContext('2d');
      oc2.save();
      oc2.translate(pX*S,pY*S);oc2.rotate(pRot*Math.PI/180);
      const fw2=flipH?-1:1,fh2=flipV?-1:1;oc2.scale(fw2,fh2);
      oc2.drawImage(uImg,-(uImg.naturalWidth*pSc*S)/2,-(uImg.naturalHeight*pSc*S)/2,uImg.naturalWidth*pSc*S,uImg.naturalHeight*pSc*S);
      oc2.restore();
      ctx.save();ctx.beginPath();ctx.rect(clipX,clipY,clipW,clipH);ctx.clip();
      const fsStr=[fBlur>0?`blur(${fBlur*S}px)`:'',fSat!==100?`saturate(${fSat}%)`:'',fBr!==100?`brightness(${fBr}%)`:'',fCt!==100?`contrast(${fCt}%)`:''].filter(Boolean).join(' ')||'none';
      ctx.filter=fsStr;ctx.drawImage(oc,0,0);ctx.filter='none';
      if(fDark>0){ctx.fillStyle=`rgba(0,0,0,${fDark/100})`;ctx.fillRect(0,0,W,H);}
      if(tintAmount>0){const tr2=parseInt(tintColor.slice(1,3),16),tg=parseInt(tintColor.slice(3,5),16),tb=parseInt(tintColor.slice(5,7),16);ctx.fillStyle=`rgba(${tr2},${tg},${tb},${tintAmount/100})`;ctx.fillRect(0,0,W,H);}
      ctx.restore();
    }

    // 3. FADE / VIGNETTE — layout moduna göre
    const rgb=h2r(panelColor);
    const spread=Math.round(60-fadeSharpness*0.58);
    const s0=fadeStart/100,s1=Math.min(fadeStart+spread*0.4,95)/100,s2=Math.min(fadeStart+spread,100)/100;
    let grad;
    if(layoutMode==='full-vignette'){
      grad=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.15,W/2,H/2,Math.max(W,H)*0.7);
      grad.addColorStop(0,`rgba(${rgb},0)`);
      grad.addColorStop(0.6,`rgba(${rgb},0.55)`);
      grad.addColorStop(1,`rgba(${rgb},0.92)`);
    } else if(layoutMode==='v-top'){
      const ph=H*(imgWidth/100);
      grad=ctx.createLinearGradient(0,0,0,ph);
      grad.addColorStop(0,`rgba(${rgb},0)`);
      grad.addColorStop(s0,`rgba(${rgb},0)`);
      grad.addColorStop(s1,`rgba(${rgb},.55)`);
      grad.addColorStop(s2,`rgba(${rgb},1)`);
      grad.addColorStop(1,`rgba(${rgb},1)`);
    } else if(layoutMode==='v-bottom'){
      const ph=H*(imgWidth/100);
      grad=ctx.createLinearGradient(0,H,0,H-ph);
      grad.addColorStop(0,`rgba(${rgb},0)`);
      grad.addColorStop(s0,`rgba(${rgb},0)`);
      grad.addColorStop(s1,`rgba(${rgb},.55)`);
      grad.addColorStop(s2,`rgba(${rgb},1)`);
      grad.addColorStop(1,`rgba(${rgb},1)`);
    } else {
      // h-left, h-right, full-fade
      const fadeW=W*(imgWidth/100);
      const isRight=(layoutMode==='h-right')||(layoutMode==='full-fade'&&imgSide==='right');
      if(isRight){grad=ctx.createLinearGradient(W,0,W-fadeW,0);}
      else{grad=ctx.createLinearGradient(0,0,fadeW,0);}
      grad.addColorStop(0,`rgba(${rgb},0)`);
      grad.addColorStop(s0,`rgba(${rgb},0)`);
      grad.addColorStop(s1,`rgba(${rgb},.55)`);
      grad.addColorStop(s2,`rgba(${rgb},1)`);
      grad.addColorStop(1,`rgba(${rgb},1)`);
    }
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);


    // 5. METİN (inline biçimlendirme destekli)
    const bnEl=document.getElementById('banner');
    const bnR=bnEl.getBoundingClientRect();
    const bSc=bnR.width/canvasW;

    // DOM düğümlerinden inline biçimlendirilmiş segmentler çıkar
    function extractSegments(node, inherited){
      const segs=[];
      node.childNodes.forEach(child=>{
        if(child.nodeType===3){
          // Text node
          if(child.textContent)segs.push({text:child.textContent,...inherited});
        } else if(child.nodeType===1){
          const cs2=window.getComputedStyle(child);
          const merged={...inherited};
          const fw=cs2.fontWeight;
          if(fw==='bold'||parseInt(fw)>=700)merged.fontWeight='bold';
          if(cs2.fontStyle==='italic')merged.fontStyle='italic';
          if(cs2.textDecoration&&cs2.textDecoration.includes('underline'))merged.underline=true;
          if(cs2.textDecoration&&cs2.textDecoration.includes('line-through'))merged.lineThrough=true;
          const fc=cs2.color;if(fc&&fc!=='rgba(0, 0, 0, 0)')merged.color=fc;
          const bg2=cs2.backgroundColor;if(bg2&&bg2!=='rgba(0, 0, 0, 0)')merged.highlight=bg2;
          const fsz=parseFloat(cs2.fontSize);if(fsz>0)merged.fontSize=fsz;
          const tt=cs2.textTransform;if(tt&&tt!=='none')merged.textTransform=tt;
          const ff=cs2.fontFamily;if(ff)merged.fontFamily=ff;
          const innerSegs=extractSegments(child,merged);
          if(child.tagName==='BR'){segs.push({text:'\n',...inherited});}
          else segs.push(...innerSegs);
        }
      });
      return segs;
    }

    // Segment listesini satırlara böl (word-wrap destekli)
    function segmentsToLines(segments, baseCs, blkWpx){
      const lineH=parseFloat(baseCs.lineHeight)||parseFloat(baseCs.fontSize)*1.2;
      const baseTransform=baseCs.textTransform;
      // Önce text node'larını '\n'e göre satır kır
      const rawLines=[[]]; // her satır segment listesi
      segments.forEach(seg=>{
        const parts=seg.text.split('\n');
        parts.forEach((part,pi)=>{
          if(pi>0)rawLines.push([]);
          if(part)rawLines[rawLines.length-1].push({...seg,text:part});
        });
      });
      // Her satır için word-wrap uygula
      const finalLines=[];
      rawLines.forEach(lineParts=>{
        // Tek satırı segmentler olarak word-wrap
        // Basit yaklaşım: tüm segmentleri flatten et, genişliği hesapla
        let currentLine=[];
        let currentW=0;
        lineParts.forEach(seg=>{
          const transform=seg.textTransform||baseTransform||'none';
          const txt=transform==='uppercase'?seg.text.toUpperCase():transform==='lowercase'?seg.text.toLowerCase():seg.text;
          const words=txt.split(' ');
          words.forEach((word,wi)=>{
            const wordWithSpace=(wi>0||currentLine.length>0)?' '+word:word;
            const fsz=(seg.fontSize||parseFloat(baseCs.fontSize))*S;
            const fw=seg.fontWeight||baseCs.fontWeight||'400';
            const fi=seg.fontStyle||baseCs.fontStyle||'normal';
            const ff=seg.fontFamily||baseCs.fontFamily||"'Bebas Neue',sans-serif";
            ctx.font=`${fi} ${fw} ${fsz}px ${ff}`;
            const wordW=ctx.measureText(wordWithSpace).width;
            if(currentW+wordW>blkWpx*S+1&&currentLine.length>0){
              finalLines.push({segs:currentLine,lineH});
              currentLine=[];currentW=0;
              ctx.font=`${fi} ${fw} ${fsz}px ${ff}`;
              const ww2=ctx.measureText(word).width;
              currentLine.push({...seg,text:word});currentW=ww2;
            } else {
              currentLine.push({...seg,text:wordWithSpace});currentW+=wordW;
            }
          });
        });
        finalLines.push({segs:currentLine,lineH});
      });
      return finalLines;
    }

    ['blk-ust','blk-main','blk-alt'].forEach(blkId=>{
      const blkEl=document.getElementById(blkId);if(!blkEl||blkEl.style.display==='none')return;
      const spanId=blkId==='blk-ust'?'ust-text':blkId==='blk-main'?'main-text':'alt-text';
      const spanEl=document.getElementById(spanId);if(!spanEl)return;
      const rawText=spanEl.innerText||spanEl.textContent||'';if(!rawText.trim())return;
      const blkR=blkEl.getBoundingClientRect();
      const blkX=(blkR.left-bnR.left)/bSc;const blkY=(blkR.top-bnR.top)/bSc;
      const blkW=blkR.width/bSc;
      const bgEl2=document.getElementById(blkId==='blk-ust'?'bg-ust':blkId==='blk-main'?'bg-main':'bg-alt');
      if(bgEl2){
        const bgCs2=window.getComputedStyle(bgEl2);
        const bgStyle=bgCs2.backgroundColor||bgEl2.style.background||'';
        if(bgStyle&&bgStyle!=='rgba(0, 0, 0, 0)'&&bgStyle!=='transparent'){
          ctx.fillStyle=bgStyle;ctx.fillRect(blkX*S,blkY*S,blkW*S,(blkR.height/bSc)*S);

      const baseLetterSpacing=parseFloat(cs.letterSpacing||'0')*S;
      const textAlign=cs.textAlign||'left';

      // Gölge uygula
      const sh=cs.textShadow;

        rawLines2.forEach(paragraph=>{

      } else {
        // Inline biçimlendirilmiş: segment tabanlı render
        const baseInherited={
          color:cs.color||'#ffffff',
          fontFamily:cs.fontFamily||"'Bebas Neue',sans-serif",
          fontWeight:cs.fontWeight||'400',
          fontStyle:cs.fontStyle||'normal',
          fontSize:parseFloat(cs.fontSize)||24,

        };
        const segments=extractSegments(spanEl,baseInherited);

            const fsz=(seg.fontSize||parseFloat(cs.fontSize))*S;

          });

          // Segmentleri çiz
          segs.forEach(seg=>{
            const fsz=(seg.fontSize||parseFloat(cs.fontSize))*S;
            const fw=seg.fontWeight||'400';const fi=seg.fontStyle||'normal';
            const ff=seg.fontFamily||"'Bebas Neue',sans-serif";
            ctx.font=`${fi} ${fw} ${fsz}px ${ff}`;
            const segW=ctx.measureText(seg.text).width;
            // Highlight (arka plan)

            // Line-through
            if(seg.lineThrough){ctx.save();ctx.strokeStyle=seg.color||'#ffffff';ctx.lineWidth=Math.max(1,fsz*0.06);ctx.beginPath();ctx.moveTo(tx,ty+fsz*0.55);ctx.lineTo(tx+segW,ty+fsz*0.55);ctx.stroke();ctx.restore();}
            tx+=segW;
          });
          ty+=lh||lineH;
        });
      }
      ctx.restore();
    });

    // 5b. PORTRAIT 3:4 SOSYAL MEDYA BANDI (export — SVG path ikonlar)
    if(_res==='1080x1440'){
      const _inset=Math.max(0,Math.round(canvasW*(textInset/100)));
      const _safeB=H-Math.round(_inset*0.5);
      const _bH=Math.round(H*0.062);
      const _bTop=_safeB-_bH;
      ctx.save();
      // Arka plan
      ctx.fillStyle='rgba(0,0,0,0.62)';
      ctx.fillRect(0,_bTop,W,_bH);
      // Üst ince çizgi
      ctx.strokeStyle='rgba(255,255,255,0.10)';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,_bTop);ctx.lineTo(W,_bTop);ctx.stroke();

      const _iSz=Math.round(_bH*0.54);
      const _tSz=Math.round(_bH*0.38);
      const _gap=0;
      const _cy=_bTop+_bH/2;

      // SVG path'leri 24x24 viewBox üzerinden — canvas'a ölçekleyerek çiz

        const offX=(size-vbW*sc)/2;
        const offY=(size-vbH*sc)/2;
        ctx.save();
        ctx.translate(cx-size/2+offX, cy-size/2+offY);
        ctx.scale(sc,sc);
        ctx.fillStyle=color;
        paths.forEach(d=>{
          const p=new Path2D(d);
          ctx.fill(p,'evenodd');
        });
        ctx.restore();
      }

      // Instagram kare — 448x512 viewBox (fa-square-instagram, FA6 kesin)
      const igPaths=[
        'M224 202.66A53.34 53.34 0 1 0 277.36 256 53.38 53.38 0 0 0 224 202.66zm124.71-41a54 54 0 0 0-30.41-30.41c-21-8.29-71-6.43-94.3-6.43s-73.25-1.79-94.31 6.43a54 54 0 0 0-30.41 30.41c-8.28 21-6.43 71.05-6.43 94.33S91 329.26 99.32 350.33a54 54 0 0 0 30.41 30.41c21 8.29 71 6.43 94.31 6.43s73.24 1.79 94.3-6.43a54 54 0 0 0 30.41-30.41c8.35-21 6.43-71.05 6.43-94.33s1.92-73.26-6.47-94.41zM224 338a82 82 0 1 1 82-82 81.9 81.9 0 0 1-82 82zm85.38-148.3a19.14 19.14 0 1 1 19.13-19.14 19.1 19.1 0 0 1-19.13 19.14zM400 32H48A48 48 0 0 0 0 80V432a48 48 0 0 0 48 48H400a48 48 0 0 0 48-48V80a48 48 0 0 0-48-48zm-17.12 290c-1.29 25.63-7.14 48.34-25.85 67s-41.4 24.63-67 25.85c-26.41 1.49-105.59 1.49-132 0-25.63-1.29-48.26-7.15-67-25.85s-24.63-41.42-25.85-67c-1.49-26.42-1.49-105.61 0-132 1.29-25.63 7.07-48.34 25.85-67s41.47-24.56 67-25.78c26.41-1.49 105.59-1.49 132 0 25.63 1.29 48.33 7.15 67 25.85s24.63 41.42 25.85 67.05c1.49 26.32 1.49 105.44 0 131.88z'
      ];

      const xPaths=[
        'M64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64zm297.1 84L257.3 234.6 379.4 396H283.8L209 298.1 123.3 396H75.8l111-126.9L69.7 116h98l67.7 89.5L313.6 116h47.5zM323.3 367.6L153.4 142.9H125.1L296.9 367.6h26.3z'

      ];

      const ytPaths=[
        'M186.8 202.1l95.2 54.1-95.2 54.1V202.1zM448 80v352c0 26.5-21.5 48-48 48H48c-26.5 0-48-21.5-48-48V80c0-26.5 21.5-48 48-48h352c26.5 0 48 21.5 48 48zm-42 176.3s0-59.6-7.6-88.2c-4.2-15.8-16.5-28.2-32.2-32.4C337.9 128 224 128 224 128s-113.9 0-142.2 7.7c-15.7 4.2-28 16.6-32.2 32.4-7.6 28.5-7.6 88.2-7.6 88.2s0 59.6 7.6 88.2c4.2 15.8 16.5 27.7 32.2 31.9C110.1 384 224 384 224 384s113.9 0 142.2-7.7c15.7-4.2 28-16.1 32.2-31.9 7.6-28.5 7.6-88.1 7.6-88.1z'
      ];

      const globePaths=[
        // Kare zemin 448x512
        'M400 32H48C21.5 32 0 53.5 0 80v352c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V80c0-26.5-21.5-48-48-48z'
      ];
      // Küre çizgilerini ayrı çizeceğiz
      const globeDrawExtra=true;

      const icons=[
        {paths:igPaths,    color:'#ffffff', vb:448, vbH:512},
        {paths:xPaths,     color:'#ffffff', vb:448, vbH:512},

      // Toplam genişlik: 5 ikon + 4 gap + divider + gap + domain
      ctx.font=`400 ${_tSz}px "Fira Sans",sans-serif`;
      const _domainTxt='www.yenijournal.com';
      const _dW=ctx.measureText(_domainTxt).width;
      const _totalW=icons.length*_iSz+(icons.length-1)*_gap+_gap*1.5+_dW;
      let _x=(W-_totalW)/2+_iSz/2; // merkez X başlangıcı

      icons.forEach((ic,i)=>{

        if(ic.globeExtra){

    // 6. WATERMARK
    if(watermarkImg){

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

/* ══ EYEDROPPER ══ */
let _eyedropActive=false,_eyedropInputId=null,_eyedropHexId=null,_eyedropCb=null;

function startEyedropper(inputId,hexId,cb){
  // Use native EyeDropper API if available
  if(window.EyeDropper){
    const ed=new EyeDropper();
    ed.open().then(r=>{
      const hex=r.sRGBHex;
      const inp=document.getElementById(inputId);
      if(inp)inp.value=hex;
      if(hexId){const hel=document.getElementById(hexId);if(hel)hel.textContent=hex.toUpperCase();}
      if(cb)cb(hex);
      toast('Renk seçildi: '+hex.toUpperCase());
    }).catch(()=>{});
    return;
  }
  // Fallback: pick color from photo canvas
  if(!uImg){toast('Önce bir fotoğraf yükleyin!');return;}
  _eyedropInputId=inputId;_eyedropHexId=hexId;_eyedropCb=cb;
  _eyedropActive=true;
  const cv=document.getElementById('photo-canvas');
  cv.style.cursor='crosshair';
  document.getElementById('banner').style.cursor='crosshair';
  toast('Fotoğraftan renk almak için tıklayın');
}

document.addEventListener('click',function(e){
  if(!_eyedropActive)return;
  const cv=document.getElementById('photo-canvas');
  const bnR=cv.getBoundingClientRect();
  if(e.clientX>=bnR.left&&e.clientX<=bnR.right&&e.clientY>=bnR.top&&e.clientY<=bnR.bottom){
    const scl=bnR.width/canvasW;
    const x=Math.round((e.clientX-bnR.left)/scl);
    const y=Math.round((e.clientY-bnR.top)/scl);
    const ctx=cv.getContext('2d');
    const px=ctx.getImageData(x,y,1,1).data;
    const hex='#'+[px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
    const inp=document.getElementById(_eyedropInputId);
    if(inp)inp.value=hex;
    if(_eyedropHexId){const hel=document.getElementById(_eyedropHexId);if(hel)hel.textContent=hex.toUpperCase();}
    if(_eyedropCb)_eyedropCb(hex);
    toast('Renk seçildi: '+hex.toUpperCase());
  }
  _eyedropActive=false;
  cv.style.cursor='';
  document.getElementById('banner').style.cursor='';
  _eyedropInputId=null;_eyedropHexId=null;_eyedropCb=null;
},true);

const COLOR_PRESETS=['#ffffff','#000000','#f0a500','#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22','#1a1a2e','#0a0a1a','#2c3e50','#c0392b','#16213e','#0f3460','#533483','#e94560'];
let _openPopupId=null;
function openClrPopup(id){
  // close any other open popups
  document.querySelectorAll('.clr-popup.on').forEach(p=>{if(p.id!==id)p.classList.remove('on');});
  const p=document.getElementById(id);if(!p)return;
  const isOpen=p.classList.contains('on');
  p.classList.toggle('on',!isOpen);
  if(!isOpen){
    // Build presets
    const presetsEl=p.querySelector('.clr-presets');
    if(presetsEl&&!presetsEl.children.length){
      presetsEl.innerHTML=COLOR_PRESETS.map(c=>`<div class="clr-pr" style="background:${c}" title="${c}" onclick="clrPopupPickPreset('${id}','${c}')"></div>`).join('');
    }
    // Build palette swatches if container exists
    const palEl=p.querySelector('.clr-swatches');
    if(palEl&&extractedPalette.length){
      palEl.innerHTML=extractedPalette.map(c=>`<div class="clr-sw" style="background:${c}" title="${c}" onclick="clrPopupPickPreset('${id}','${c}')"></div>`).join('');
    }

/* Tek blok fit — sadece o blok genişliğe sığdırma */
function autoFitTextBlock(spanId, blkId){
  const span=document.getElementById(spanId);
  const blk=document.getElementById(blkId);
  if(!span||!blk)return;
  const text=span.innerText||span.textContent||'';
  if(!text.trim())return;
  let fs=parseFloat(span.dataset.baseFontSize||window.getComputedStyle(span).fontSize||'24');
  if(!span.dataset.baseFontSize)span.dataset.baseFontSize=fs;
  else fs=parseFloat(span.dataset.baseFontSize);
  span.style.fontSize=fs+'px';
  let tries=0;
  while(tries<80&&span.scrollWidth>blk.clientWidth+2){
    fs=Math.max(6,fs-2);span.style.fontSize=fs+'px';tries++;
  }
}

/* 3 blok birlikte overlay yüksekliğine orantılı sığdırma */
function autoFitAllBlocks(){
  const ov=document.getElementById('text-overlay');if(!ov)return;
  // Overlay'in gerçek render boyutlarını al
  const ovW=ov.offsetWidth||parseFloat(ov.style.width)||1;
  let ovH=ov.offsetHeight||parseFloat(ov.style.height)||parseFloat(ov.style.maxHeight)||1;
  // Portrait 3:4: yükseklik limiti alt %50 alanı
  if(_res==='1080x1440'){
    const insetPx=Math.max(0,Math.round(canvasW*(textInset/100)));
    const safeB=canvasH-Math.round(insetPx*0.5);
    const midY=Math.round(canvasH*0.5);
    ovH=Math.max(1,safeB-midY);
  }
  if(ovW<1||ovH<1)return;

  const pairs=[
    {span:'ust-text',blk:'blk-ust'},
    {span:'main-text',blk:'blk-main'},
    {span:'alt-text',blk:'blk-alt'},
  ];
  const activePairs=pairs.filter(p=>{
    const s=document.getElementById(p.span);
    return s&&(s.innerText||s.textContent||'').trim();
  });
  if(!activePairs.length)return;

  // ── Adım 1: baseFontSize kaydet, sıfırla ──
  activePairs.forEach(p=>{
    const span=document.getElementById(p.span);if(!span)return;
    if(!span.dataset.baseFontSize)
      span.dataset.baseFontSize=parseFloat(window.getComputedStyle(span).fontSize)||24;
    span.style.fontSize=parseFloat(span.dataset.baseFontSize)+'px';
  });

  // ── Adım 2: Yatay fit — her blok kendi genişliğine sığsın ──
  activePairs.forEach(p=>{
    const span=document.getElementById(p.span);
    const blk=document.getElementById(p.blk);
    if(!span||!blk)return;
    let fs=parseFloat(span.dataset.baseFontSize)||24;
    for(let i=0;i<120&&span.scrollWidth>ovW+1;i++){
      fs=Math.max(6,fs-1);span.style.fontSize=fs+'px';
    }
  });

  // ── Adım 3: Dikey fit — toplam yükseklik ovH'e sığsın ──
  for(let iter=0;iter<120;iter++){
    let totalH=activePairs.reduce((s,p)=>{
      const b=document.getElementById(p.blk);return s+(b?b.scrollHeight:0);
    },0);
    if(totalH<=ovH-1)break;
    activePairs.forEach(p=>{
      const span=document.getElementById(p.span);if(!span)return;
      const cur=parseFloat(span.style.fontSize)||6;
      span.style.fontSize=Math.max(6,Math.round(cur*0.97))+'px';
    });
  }

  // ── Adım 4: Kesin taşma engeli ──
  ov.style.overflow='hidden';
  pairs.forEach(p=>{
    const b=document.getElementById(p.blk);if(b)b.style.overflow='hidden';
    const s=document.getElementById(p.span);if(s)s.style.overflow='hidden';
  });
}


(function(){

  const scl=()=>{const bsw=document.getElementById('bsw');return parseFloat(bsw.style.transform?.match(/scale\(([^)]+)\)/)?.[1]||1);};
  function getLayer(){return document.getElementById('photo-interact');}

  // PAN — mousedown/move/up
  document.addEventListener('mousedown',e=>{
    const layer=getLayer();if(!layer||!layer.classList.contains('on'))return;
    if(!layer.contains(e.target))return;
    isDragging=true;startX=e.clientX;startY=e.clientY;startPX=pX;startPY=pY;
    layer.classList.add('dragging');e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    const s=scl();
    const dx=(e.clientX-startX)/s;
    const dy=(e.clientY-startY)/s;
    pX=startPX+dx;pY=startPY+dy;

  document.addEventListener('wheel',e=>{

function loadCustomFont(inp){
  if(!inp.files||!inp.files[0])return;
  const file=inp.files[0];
  const name=file.name.replace(/\.[^.]+$/,'').replace(/[_\-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const family='CustomFont_'+Date.now();
  const r=new FileReader();
  r.onload=e=>{
    const style=document.createElement('style');
    const ext=file.name.split('.').pop().toLowerCase();
    const fmt={ttf:'truetype',otf:'opentype',woff:'woff',woff2:'woff2'}[ext]||'truetype';
    style.textContent=`@font-face{font-family:'${family}';src:url('${e.target.result}') format('${fmt}');font-weight:normal;font-style:normal;}`;
    document.head.appendChild(style);
    customFonts.push({name,family});
    toast(`Font yüklendi: ${name}`);
    // Add to all open font selectors
    document.querySelectorAll('select.fsel').forEach(sel=>{
      const cur=sel.value;
      sel.innerHTML+=`<option value="'${family}',sans-serif">${name} ★</option>`;
      sel.value=cur;
    });
  };
  r.readAsDataURL(file);inp.value='';
}
function fontOpts(sel){
  const custom=customFonts.map(f=>`<option value="'${f.family}',sans-serif"${f.family===sel?' selected':''}>${f.name} ★</option>`).join('');
  const base=FONTS.map(f=>`<option value="'${f}',sans-serif"${f===sel?' selected':''}>${f}</option>`).join('');

function analyzePhotoForTextBg(){
  if(!uImg)return;
  const tmpCv=document.createElement('canvas');
  tmpCv.width=canvasW;tmpCv.height=canvasH;
  const ctx=tmpCv.getContext('2d');
  ctx.save();ctx.translate(pX,pY);ctx.rotate(pRot*Math.PI/180);
  const fw=flipH?-1:1,fh=flipV?-1:1;ctx.scale(fw,fh);
  const w=uImg.naturalWidth*pSc,h=uImg.naturalHeight*pSc;
  ctx.drawImage(uImg,-w/2,-h/2,w,h);ctx.restore();
  // Sample the text side (opposite of photo)
  const sampleX=imgSide==='right'?20:Math.round(canvasW*0.52);
  const sampleW=Math.round(canvasW*0.38);const sampleH=Math.round(canvasH*0.7);
  const sampleY=Math.round(canvasH*0.15);
  // Collect color histogram
  let rSum=0,gSum=0,bSum=0,cnt=0;
  const step2=Math.max(1,Math.round(sampleW/24));
  try{
    const imgData=ctx.getImageData(sampleX,sampleY,sampleW,sampleH);
    for(let i=0;i<imgData.data.length;i+=4*step2){
      rSum+=imgData.data[i];gSum+=imgData.data[i+1];bSum+=imgData.data[i+2];cnt++;
    }
  }catch(e){
    // Also try sampling from bgColor as fallback
    const r2=parseInt(bgColor.slice(1,3),16),g2=parseInt(bgColor.slice(3,5),16),b2=parseInt(bgColor.slice(5,7),16);
    rSum=r2;gSum=g2;bSum=b2;cnt=1;
  }
  if(cnt===0)return;
  let r=Math.round(rSum/cnt),g=Math.round(gSum/cnt),b=Math.round(bSum/cnt);
  // Darken for bg use (dominant tone, deeper)
  const darkR=Math.round(r*0.35),darkG=Math.round(g*0.35),darkB=Math.round(b*0.35);
  const bgHex='#'+[darkR,darkG,darkB].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('');
  // Apply as panel background color
  bgColor=bgHex;applyBgColor();
  const tbc=document.getElementById('tb-bg-color');if(tbc)tbc.value=bgHex;
  // Compute luminance of bg to decide text color
  const lum=(0.299*darkR+0.587*darkG+0.114*darkB)/255;
  // Contrasting text color: light on dark, dark on light
  let textHex,accentHex;
  if(lum<0.4){
    // Dark bg → light text
    // Derive accent from dominant hue, boosted
    const boost=2.2;
    const aR=Math.min(255,Math.round(r*boost)),aG=Math.min(255,Math.round(g*boost)),aB=Math.min(255,Math.round(b*boost));
    accentHex='#'+[aR,aG,aB].map(v=>v.toString(16).padStart(2,'0')).join('');
    textHex='#ffffff';
  } else {
    // Light bg → dark text
    accentHex='#'+[Math.round(r*0.3),Math.round(g*0.3),Math.round(b*0.3)].map(v=>v.toString(16).padStart(2,'0')).join('');
    textHex='#111111';
  }
  // Apply text colors to all text elements
  const ustEl=document.getElementById('ust-text');
  const mainEl=document.getElementById('main-text');
  const altEl=document.getElementById('alt-text');
  if(ustEl)ustEl.style.color=accentHex;
  if(mainEl)mainEl.style.color=textHex;
  if(altEl)altEl.style.color='rgba('+parseInt(accentHex.slice(1,3),16)+','+parseInt(accentHex.slice(3,5),16)+','+parseInt(accentHex.slice(5,7),16)+',0.85)';
  // Apply text bg with detected color at current opacity
  _textBgColor=bgHex;
  setAllTextBg(bgHex);
  // Sync panel color inputs if any open
  ['ubg','mbg','abg'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=bgHex;});
  ['ubh','mbh','abh'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=bgHex.toUpperCase();});
  toast('🎨 Renk analiz edildi → Zemin: '+bgHex.toUpperCase()+' Metin: '+textHex);
}

/* ══ GERİ AL / YİNELE (History Stack) ══ */
const HIST_MAX=40;
let _hist=[],_histIdx=-1,_histPaused=false;

function histSnapshot(){
  if(_histPaused)return;
  const snap=JSON.stringify(gatherSettings());
  if(_histIdx>=0&&_hist[_histIdx]===snap)return;
  _hist=_hist.slice(0,_histIdx+1);
  _hist.push(snap);
  if(_hist.length>HIST_MAX)_hist.shift();
  _histIdx=_hist.length-1;
  _updateHistBtns();
}
function histUndo(){
  if(_histIdx<=0)return;
  _histIdx--;
  _histPaused=true;
  applySettingsObj(JSON.parse(_hist[_histIdx]));
  _histPaused=false;
  _updateHistBtns();
  toast('Geri alındı');
}
function histRedo(){
  if(_histIdx>=_hist.length-1)return;
  _histIdx++;
  _histPaused=true;
  applySettingsObj(JSON.parse(_hist[_histIdx]));
  _histPaused=false;
  _updateHistBtns();
  toast('Yinelendi');
}
function _updateHistBtns(){
  const u=document.getElementById('btn-undo'),r=document.getElementById('btn-redo');
  if(u)u.style.opacity=_histIdx>0?'1':'0.35';
  if(r)r.style.opacity=_histIdx<_hist.length-1?'1':'0.35';
}

/* ══ FADE HANDLE DRAG ══ */
(function(){
  let _fhDrag=false;
  const handle=()=>document.getElementById('fade-handle');
  function getScale(){const t=(document.getElementById('bsw').style.transform||'scale(1)').match(/scale\(([^)]+)\)/);return t?parseFloat(t[1]):1;}

  function calcFadeFromClientX(clientX){
    const bnR=document.getElementById('banner').getBoundingClientRect();
    const s=getScale();
    const xPct=((clientX-bnR.left)/s/canvasW)*100;
    if(imgSide==='left'){
      // Foto sol (0..imgWidth%). Handle xPct konumundan fadeStart hesapla.
      // positionFadeHandle: xPct = imgWidth*(1-fadeStart/100)
      // → fadeStart = (1 - xPct/imgWidth)*100
      // Ama bu ters davranış veriyordu: handle sağa → fadeStart azalıyor.
      // Düzeltme: handle sağa gidince fadeStart artmalı (fade daha içe kayar = renk alanı büyür)
      // Yeni formül: fadeStart = (xPct/imgWidth)*100
      const fs=(xPct/Math.max(imgWidth,1))*100;
      fadeStart=Math.max(0,Math.min(80,fs));
    } else {
      // Foto sağ ((100-imgWidth)..100%). Handle sağa → fade daha dışa → renk alanı küçülür.
      // positionFadeHandle: xPct = (100-imgWidth)+imgWidth*(fadeStart/100)
      // → fadeStart = ((xPct-(100-imgWidth))/imgWidth)*100
      // Bu zaten doğru yönde çalışıyor, değiştirme
      const photoStart=100-imgWidth;
      const fs=((xPct-photoStart)/Math.max(imgWidth,1))*100;
      fadeStart=Math.max(0,Math.min(80,fs));
    }
    rebuildFade();drawPhoto();
    const fl=document.getElementById('tb-fd-lbl');if(fl)fl.textContent=Math.round(fadeStart)+'%';
    updateVal('v-fd',Math.round(fadeStart));
    updateVal('v-fd2',Math.round(fadeStart));
  }

  document.addEventListener('mousedown',e=>{
    const h=handle();if(!h||!h.contains(e.target))return;
    _fhDrag=true;h.classList.add('dragging');
    e.preventDefault();e.stopPropagation();
  });
  document.addEventListener('mousemove',e=>{if(!_fhDrag)return;calcFadeFromClientX(e.clientX);});
  document.addEventListener('mouseup',()=>{
    if(!_fhDrag)return;_fhDrag=false;
    const h=handle();if(h)h.classList.remove('dragging');
    setTimeout(histSnapshot,200);
  });
  document.addEventListener('touchstart',e=>{
    const h=handle();if(!h||!h.contains(e.target))return;
    _fhDrag=true;h.classList.add('dragging');e.preventDefault();
  },{passive:false});
  document.addEventListener('touchmove',e=>{
    if(!_fhDrag)return;calcFadeFromClientX(e.touches[0].clientX);e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',()=>{
    if(!_fhDrag)return;_fhDrag=false;
    const h=handle();if(h)h.classList.remove('dragging');
    setTimeout(histSnapshot,200);
  });
})();

function toggleHistPopup(){
  const p=document.getElementById('hist-popup');if(!p)return;
  if(p.classList.contains('on')){p.classList.remove('on');return;}
  // Son 8 geçmiş adımı göster
  const items=_hist.slice(Math.max(0,_hist.length-8)).reverse();
  const labels=['Renk değişikliği','Metin düzenleme','Fotoğraf işlemi','Geçiş ayarı','Filtre değişikliği','Şablon uygulandı','Ayar değişikliği'];
  p.innerHTML='<div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:2px 8px 6px;border-bottom:1px solid var(--border)">Geçmiş (son '+items.length+')</div>'
    +items.map((s,i)=>{
      const realIdx=_hist.length-1-i;
      const isCurrent=realIdx===_histIdx;
      return `<div class="hist-item${isCurrent?' current':''}" onclick="histJumpTo(${realIdx});toggleHistPopup()"><i class="fa-solid fa-circle-dot"></i>${labels[i%labels.length]} #${realIdx+1}</div>`;
    }).join('');
  p.classList.add('on');
  // Dışarı tıklanınca kapat
  setTimeout(()=>{
    document.addEventListener('click',function _close(e){
      if(!p.contains(e.target)&&e.target.id!=='btn-hist'){p.classList.remove('on');}
      document.removeEventListener('click',_close);
    });
  },10);
}
function histJumpTo(idx){
  if(idx<0||idx>=_hist.length)return;
  _histIdx=idx;_histPaused=true;
  applySettingsObj(JSON.parse(_hist[_histIdx]));
  _histPaused=false;_updateHistBtns();
  toast('Geçmişe gidildi: adım '+(idx+1));
}

document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  const inText=(tag==='TEXTAREA'||tag==='INPUT'||document.activeElement?.isContentEditable);
  if((e.ctrlKey||e.metaKey)){
    if(e.key==='z'&&!e.shiftKey){e.preventDefault();histUndo();return;}
    if((e.key==='y')||(e.key==='z'&&e.shiftKey)){e.preventDefault();histRedo();return;}
    if(e.key==='s'){e.preventDefault();saveSettings();toast('Ayarlar kaydedildi ✓');return;}
    if(e.key==='d'){e.preventDefault();doDownload();return;}
  }
  if(e.key==='Escape'){closePanel();return;}
});

    alt:{placeholder:'Borsa · Döviz',font:'Gotham RX Cond Ultra',size:46,ls:1,color:'rgba(255,210,100,0.8)'},
  },
  {
    name:'Analiz',icon:'fa-chart-bar',color:'#330066',
    bgColor:'#0d0a1a',
    tags:[{label:'ANALİZ',icon:'fa-solid fa-chart-bar',bg:'#2a1a5a',fg:'#aa88ff'}],
    ust:{placeholder:'ANALİZ',font:'Gotham RX Cond Ultra',size:48,ls:5,color:'#aa88ff'},
    main:{placeholder:'Konu Başlığı',font:'Gotham RX Cond Ultra',size:156,ls:1,lh:1.0,color:'#ffffff'},
    alt:{placeholder:'Uzman · Tarih',font:'Gotham RX Cond Ultra',size:42,ls:1,color:'rgba(200,180,255,0.8)'},
  },
  {
    name:'Röportaj',icon:'fa-microphone',color:'#005544',
    bgColor:'#001a15',
    tags:[{label:'RÖPORTAJ',icon:'fa-solid fa-microphone',bg:'#003828',fg:'#22ddaa'}],
    ust:{placeholder:'RÖPORTAJ',font:'Gotham RX Cond Ultra',size:48,ls:4,color:'#22ddaa'},
    main:{placeholder:'İsim Soyisim',font:'Gotham RX Cond Ultra',size:160,ls:1,lh:1.0,color:'#ffffff'},
    alt:{placeholder:'Ünvan · Kurum',font:'Gotham RX Cond Ultra',size:46,ls:2,color:'rgba(150,255,220,0.8)'},
  },
];

let userTemplates=[];
let pinnedTemplateIds=new Set();

function loadUserTemplates(){
  try{
    const s=localStorage.getItem('gep_user_templates');
    if(s){const d=JSON.parse(s);userTemplates=d.templates||[];pinnedTemplateIds=new Set(d.pinned||[]);}
  }catch(e){}
}
function saveUserTemplates(){
  try{localStorage.setItem('gep_user_templates',JSON.stringify({templates:userTemplates,pinned:[...pinnedTemplateIds]}));}catch(e){}
}
loadUserTemplates();

function applyTemplate(t){
  // Arka plan rengi
  bgColor=t.bgColor||bgColor;applyBgColor();
  const bc=document.getElementById('tb-bg-color');if(bc)bc.value=bgColor;
  const dff="'Gotham RX Cond Ultra','Bebas Neue',sans-serif";

  function applyToEl(elId,cfg){
    const el=document.getElementById(elId);if(!el)return;
    // Mevcut metni KORU — sadece placeholder güncelle, metni silme
    const curText=(el.innerText||el.textContent||'').trim();
    // Placeholder: şablondan gelen metin placeholder olarak ayarla
    const ph=cfg.placeholder||cfg.text||'';
    if(ph)el.setAttribute('data-placeholder',ph);
    // Eğer mevcut metin yoksa şablon metnini placeholder olarak bırak (metin eklenmez)
    // Eğer mevcut metin varsa dokunma
    // Stil uygula — baseFontSize'ı sıfırla ki autoFit yeniden hesaplasın
    el.style.fontFamily=cfg.font?("'"+cfg.font+"',sans-serif"):dff;
    el.style.fontSize=(cfg.size||28)+'px';
    el.style.letterSpacing=(cfg.ls||2)+'px';
    if(cfg.lh)el.style.lineHeight=cfg.lh;
    el.style.color=cfg.color||'#ffffff';
    el.style.textTransform='uppercase';
    el.style.fontWeight='900';
    // baseFontSize'ı şablon boyutuna güncelle — autoFit bu değerden başlasın
    el.dataset.baseFontSize=cfg.size||28;
  }
  applyToEl('ust-text',t.ust);
  applyToEl('main-text',t.main);
  applyToEl('alt-text',t.alt);
  // Stiller değişti, autoFit'i tetikle
  setTimeout(()=>autoFitAllBlocks(),50);

  if(activeTab==='metin'){const sc=document.getElementById('spc');if(sc)sc.innerHTML=buildHTML('metin');}
  if(activeTab==='sablonlar'){const sc=document.getElementById('spc');if(sc)sc.innerHTML=buildHTML('sablonlar');}
  setTimeout(histSnapshot,200);
  toast('Şablon uygulandı: '+t.name);
}

function _captureCurrentState(name,existingId){
  const ustEl=document.getElementById('ust-text');
  const mainEl=document.getElementById('main-text');
  const altEl=document.getElementById('alt-text');
  function sv(el,prop){return el?window.getComputedStyle(el)[prop]:'';}
  return {
    id:existingId||('u_'+Date.now()),
    name:(name||'').trim(),
    icon:'fa-bookmark',
    color:bgColor,
    bgColor:bgColor,
    ust:{
      placeholder:ustEl?(ustEl.innerText||ustEl.getAttribute('data-placeholder')||''):'',
      font:(ustEl&&ustEl.style.fontFamily)||'Gotham RX Cond Ultra',
      size:ustEl?Math.round(parseFloat(sv(ustEl,'fontSize'))||28):28,
      ls:ustEl?Math.round(parseFloat(sv(ustEl,'letterSpacing'))||3):3,
      color:ustEl?sv(ustEl,'color'):'rgba(255,255,255,0.85)',
    },
    main:{
      placeholder:mainEl?(mainEl.innerText||mainEl.getAttribute('data-placeholder')||''):'',
      font:(mainEl&&mainEl.style.fontFamily)||'Gotham RX Cond Ultra',
      size:mainEl?Math.round(parseFloat(sv(mainEl,'fontSize'))||100):100,
      ls:mainEl?Math.round(parseFloat(sv(mainEl,'letterSpacing'))||2):2,
      lh:mainEl?parseFloat(sv(mainEl,'lineHeight'))/(parseFloat(sv(mainEl,'fontSize'))||100)||0.95:0.95,
      color:mainEl?sv(mainEl,'color'):'#ffffff',
    },
    alt:{
      placeholder:altEl?(altEl.innerText||altEl.getAttribute('data-placeholder')||''):'',
      font:(altEl&&altEl.style.fontFamily)||'Gotham RX Cond Ultra',
      size:altEl?Math.round(parseFloat(sv(altEl,'fontSize'))||24):24,
      ls:altEl?Math.round(parseFloat(sv(altEl,'letterSpacing'))||2):2,
      color:altEl?sv(altEl,'color'):'rgba(255,255,255,0.72)',
    },
  };
}

function saveCurrentAsTemplate(name){
  if(!name||!name.trim()){toast('Şablon adı boş olamaz!');return;}
  const t=_captureCurrentState(name,null);
  userTemplates.push(t);
  saveUserTemplates();
  const sc=document.getElementById('spc');if(sc)sc.innerHTML=buildHTML('sablonlar');
  buildTemplateBar();
  toast('Şablon kaydedildi: '+t.name);
}

function updateUserTemplate(id){
  const idx=userTemplates.findIndex(t=>t.id===id);
  if(idx<0){toast('Şablon bulunamadı');return;}
  const old=userTemplates[idx];
  const updated=_captureCurrentState(old.name,id);
  userTemplates[idx]=updated;
  saveUserTemplates();
  const sc=document.getElementById('spc');if(sc)sc.innerHTML=buildHTML('sablonlar');
  buildTemplateBar();
  toast('Şablon güncellendi: '+updated.name);
}

function deleteUserTemplate(id){
  userTemplates=userTemplates.filter(t=>t.id!==id);
  pinnedTemplateIds.delete(id);
  saveUserTemplates();
  const sc=document.getElementById('spc');if(sc)sc.innerHTML=buildHTML('sablonlar');
  buildTemplateBar();
  toast('Şablon silindi');
}

function togglePinTemplate(id){
  if(pinnedTemplateIds.has(id))pinnedTemplateIds.delete(id);
  else pinnedTemplateIds.add(id);
  saveUserTemplates();
  buildTemplateBar();
  const sc=document.getElementById('spc');if(sc)sc.innerHTML=buildHTML('sablonlar');
}

function buildTemplateBar(){
  const bar=document.getElementById('template-bar');if(!bar)return;
  const builtIn=TEMPLATES.map((t,i)=>({...t,_bi:true,_idx:i}));
  const usr=userTemplates.filter(t=>pinnedTemplateIds.has(t.id));
  const all=[...builtIn,...usr];
  bar.innerHTML=all.map(t=>{
    const oc=t._bi?`applyTemplate(TEMPLATES[${t._idx}])`:`applyTemplate(userTemplates.find(u=>u.id==='${t.id}'))`;
    return `<button class="tpl-btn${!t._bi?' pinned':''}" onclick="${oc}" title="${t.name}" style="border-color:${t.color}40;color:${t.color}"><i class="fa-solid ${t.icon}"></i><span>${t.name}</span></button>`;
  }).join('');
}

function _tplTagDots(tgs){
  if(!tgs||!tgs.length)return '';
  return '<div style="display:flex;gap:3px;position:absolute;bottom:3px;left:50%;transform:translateX(-50%)">'
    +tgs.map(tg=>`<div style="width:6px;height:6px;border-radius:50%;background:${tg.color||'#f0a500'};box-shadow:0 0 4px ${tg.color||'#f0a500'}88"></div>`).join('')
    +'</div>';
}

function buildTemplatePanel(){
  // Hazır şablonlar — karta tıklama uygulasın
  const allBuiltIn=TEMPLATES.map((t,i)=>{
    const ph=t.ust.placeholder||'';const pm=t.main.placeholder||'';const pa=t.alt.placeholder||'';
    return `
    <div class="tpl-card" onclick="applyTemplate(TEMPLATES[${i}])" title="${t.name} — Uygula">
      <div class="tpl-thumb" style="background:${t.bgColor};position:relative">
        <div class="tpl-thumb-mini">
          <div class="tpl-thumb-sub" style="color:${t.ust.color}">${ph}</div>
          <div class="tpl-thumb-main" style="color:${t.main.color}">${pm}</div>
          <div class="tpl-thumb-sub" style="color:${t.alt.color}">${pa}</div>
        </div>
        ${_tplTagDots(t.tags)}
      </div>
      <div class="tpl-info">
        <span class="tpl-name" style="color:${t.color}"><i class="fa-solid ${t.icon}"></i> ${t.name}</span>
        <button class="tpl-pin-btn" onclick="applyTemplate(TEMPLATES[${i}]);event.stopPropagation()" title="Uygula" style="color:var(--accent)"><i class="fa-solid fa-check"></i></button>
      </div>
    </div>`;}).join('');

  // Özel şablonlar — uygula, güncelle, sabitle, sil
  const allUser=userTemplates.map(t=>{
    const ph=t.ust&&(t.ust.placeholder||t.ust.text)||'';
    const pm=t.main&&(t.main.placeholder||t.main.text)||'';
    const pa=t.alt&&(t.alt.placeholder||t.alt.text)||'';
    const isPinned=pinnedTemplateIds.has(t.id);
    return `
    <div class="tpl-card${isPinned?' pinned-card':''}" onclick="applyTemplate(userTemplates.find(u=>u.id==='${t.id}'))" title="${t.name} — Uygula">
      <div class="tpl-thumb" style="background:${t.bgColor||'#111'};position:relative">
        <div class="tpl-thumb-mini">
          <div class="tpl-thumb-sub" style="color:${t.ust&&t.ust.color||'#fff'}">${ph}</div>
          <div class="tpl-thumb-main" style="color:${t.main&&t.main.color||'#fff'}">${pm}</div>
          <div class="tpl-thumb-sub" style="color:${t.alt&&t.alt.color||'rgba(255,255,255,.6)'}">${pa}</div>
        </div>
        ${_tplTagDots(t.tags)}
      </div>
      <div class="tpl-info">
        <span class="tpl-name">${t.name}</span>
        <button class="tpl-pin-btn${isPinned?' on':''}" onclick="togglePinTemplate('${t.id}');event.stopPropagation()" title="${isPinned?'Sabitlendi':'Sabitle'}"><i class="fa-solid fa-thumbtack"></i></button>
        <button class="tpl-pin-btn" onclick="updateUserTemplate('${t.id}');event.stopPropagation()" title="Mevcut tasarımla güncelle" style="color:#4CAF50"><i class="fa-solid fa-rotate"></i></button>
        <button class="tpl-pin-btn" onclick="applyTemplate(userTemplates.find(u=>u.id==='${t.id}'));event.stopPropagation()" title="Uygula" style="color:var(--accent)"><i class="fa-solid fa-check"></i></button>
        <button class="tpl-del-btn" onclick="if(confirm('${t.name} şablonunu sil?'))deleteUserTemplate('${t.id}');event.stopPropagation()" title="Sil"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>`;}).join('');

  return `
    <div class="slbl"><i class="fa-solid fa-layer-group" style="color:var(--accent)"></i> Hazır Şablonlar <span style="font-size:9px;color:var(--muted);font-style:normal">(tıkla = uygula)</span></div>
    <div class="tpl-grid">${allBuiltIn}</div>
    ${userTemplates.length?`
    <div class="slbl" style="margin-top:4px"><i class="fa-solid fa-bookmark" style="color:var(--accent)"></i> Özel Şablonlarım</div>
    <div class="tpl-grid">${allUser}</div>`:''}
    <div class="slbl" style="margin-top:4px"><i class="fa-solid fa-plus" style="color:var(--accent)"></i> Yeni Şablon Oluştur</div>
    <div class="tpl-create-form">
      <span style="font-size:10px;color:var(--muted);line-height:1.7">Mevcut metin ve renk ayarlarını şablon olarak kaydedin. <i class="fa-solid fa-rotate" style="color:#4CAF50"></i> = üzerine yaz, <i class="fa-solid fa-thumbtack" style="color:var(--accent)"></i> = topbar'a sabitle.</span>
      <input type="text" id="new-tpl-name" placeholder="Şablon adı..." maxlength="32">
      <button class="bndl" style="padding:10px;font-size:11px" onclick="saveCurrentAsTemplate(document.getElementById('new-tpl-name').value)"><i class="fa-solid fa-floppy-disk"></i> MEVCUT TASARIMI KAYDET</button>
    </div>`;
}

function init(){
  canvasW=3840; canvasH=1080; _res='3840x1080';
  const bn=document.getElementById('banner');
  if(bn){bn.style.width=canvasW+'px';bn.style.height=canvasH+'px';}
  scaleBanner();
  document.getElementById('color-panel').style.background=bgColor;
  rebuildFade(); // also positions placeholder and interact layer
  ['main-text','ust-text','alt-text'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      el.textContent='';el.style.display='block';el.style.textAlign='center';
      el.style.fontFamily="'Gotham RX Cond Ultra','Bebas Neue',sans-serif";
      el.style.textTransform='uppercase';
      el.style.fontWeight='900';
      // CSS'den taban font boyutunu sakla
      const csFs=parseFloat(window.getComputedStyle(el).fontSize||'24');
      el.dataset.baseFontSize=csFs;
    }
  });
  ['blk-main','blk-ust','blk-alt'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='block';
  });
  setLayout('left');
  applyTextInset();
  // Serbest konum başlangıcı — metin sağda orta, etiket alt orta
  _textXPct=85; _textYPct=50;
  _tagXPct=50; _tagYPct=85;
  applyFreeTextPos(_textXPct,_textYPct);
  drawPhoto();
  buildToolbarGrids();
  positionFadeHandle();
  // Safe zone + grid varsayılan aktif
  showSafeZone=true; showGridGuide=true;
  const bsz=document.getElementById('btn-safezone');if(bsz)bsz.classList.add('on');
  const bgd=document.getElementById('btn-gridguide');if(bgd)bgd.classList.add('on');
  drawGuideOverlay();
  // Load persisted settings
  const saved=loadSettings();
  if(Object.keys(saved).length>0)applySettingsObj(saved);
  // Toolbar grids + renk sync after settings load
  buildToolbarGrids();
  syncToolbarFade();
  const tbc=document.getElementById('tb-bg-color');if(tbc)tbc.value=bgColor;
  // Renk popup presets başlangıç
  initReverseSync();
  buildTemplateBar();
  setTimeout(()=>{histSnapshot();_updateHistBtns();},300);
  // Auto-save on interactions
  let _st,_hs;
  const autoSave=()=>{clearTimeout(_st);_st=setTimeout(saveSettings,800);};
  const autoSnap=()=>{clearTimeout(_hs);_hs=setTimeout(histSnapshot,600);};
  document.addEventListener('input',autoSave);
  document.addEventListener('input',autoSnap);
  document.addEventListener('click',autoSave);
  // Auto-fit text on input — 3 blok birlikte orantılı küçülür
  ['main-text','ust-text','alt-text'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      el.addEventListener('input',()=>{
        // baseFontSize'ı sıfırla ki kullanıcı yeni yazdığında taban boyut güncellensin
        delete el.dataset.baseFontSize;
        clearTimeout(el._fitTimer);
        el._fitTimer=setTimeout(autoFitAllBlocks,80);
      });
    }
  });
}
init();
</script>
